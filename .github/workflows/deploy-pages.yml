name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.set_url.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Log deployment failure and wait before retry
        if: steps.deployment.outcome == 'failure'
        run: |
          echo "Initial deployment attempt failed. Waiting 30 seconds before retry..."
          sleep 30

      - name: Retry deploy to GitHub Pages
        id: retry_deployment
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Set deployment URL
        id: set_url
        if: always()
        env:
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
          RETRY_OUTCOME: ${{ steps.retry_deployment.outcome }}
          RETRY_URL: ${{ steps.retry_deployment.outputs.page_url }}
        run: |
          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            echo "page_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          elif [ "$RETRY_OUTCOME" = "success" ]; then
            echo "page_url=$RETRY_URL" >> "$GITHUB_OUTPUT"
          else
            echo "Both deployment attempts failed; no deployment URL available." >&2
          fi
